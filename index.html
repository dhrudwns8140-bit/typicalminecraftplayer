<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고3 2차고사 개인 시험 시간표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #e2e8f0;
    --text-main: #1e293b;
    --text-sub: #64748b;
    --text-empty: #cbd5e1;
    --accent: #6366f1;
    --accent-soft: #eef2ff;
    --relative: #2563eb;
    --relative-bg: #eff6ff;
    --hover-bg: #f1f5f9;
    --active-bg: #e0e7ff;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(99,102,241,0.08);
    --shadow-card: 0 2px 8px rgba(0,0,0,0.07), 0 8px 24px rgba(99,102,241,0.10);
    --radius: 14px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .page-header .badge {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.85rem;
    border-radius: 999px;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }
  .page-header h1 {
    font-size: 1.85rem;
    font-weight: 700;
    color: var(--text-main);
    line-height: 1.25;
  }
  .page-header p {
    font-size: 0.88rem;
    color: var(--text-sub);
    margin-top: 0.5rem;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.75rem;
    margin-bottom: 1.5rem;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
  }

  .input-section {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .input-section label {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-sub);
    white-space: nowrap;
  }
  .input-section input {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text-main);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.55rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    width: 130px;
  }
  .input-section input:focus {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .student-name-display {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-left: auto;
  }
  .student-name-display span {
    font-weight: 700;
    color: var(--accent);
  }

  /* Timetable */
  .section-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .timetable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  .timetable th {
    background: var(--surface2);
    color: var(--text-sub);
    font-weight: 600;
    font-size: 0.78rem;
    padding: 0.65rem 0.75rem;
    border: 1px solid var(--border);
    text-align: center;
    white-space: nowrap;
  }
  .timetable td {
    border: 1px solid var(--border);
    padding: 0.6rem 0.75rem;
    text-align: center;
    vertical-align: middle;
    color: var(--text-sub);
    font-size: 0.82rem;
  }
  .timetable td.date-cell {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--text-main);
    background: var(--surface2);
    white-space: nowrap;
    min-width: 90px;
  }
  .timetable td.date-cell .star {
    color: var(--accent);
    font-size: 1rem;
    margin-left: 2px;
  }
  .timetable td.period-label {
    font-size: 0.75rem;
    color: var(--text-sub);
    background: #fafbfc;
    white-space: nowrap;
    min-width: 155px;
  }
  .timetable td.subject-cell {
    min-width: 140px;
  }

  .subject-chip {
    display: inline-block;
    background: var(--hover-bg);
    color: var(--text-main);
    border-radius: 6px;
    padding: 0.28rem 0.65rem;
    cursor: pointer;
    font-size: 0.84rem;
    font-weight: 500;
    transition: background 0.15s, color 0.15s, transform 0.1s;
    border: 1.5px solid transparent;
    user-select: none;
  }
  .subject-chip:hover {
    background: var(--active-bg);
    border-color: var(--accent);
    transform: scale(1.03);
  }
  .subject-chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .subject-chip.relative {
    color: var(--relative);
    font-weight: 700;
  }
  .subject-chip.relative:hover {
    background: var(--relative-bg);
    border-color: var(--relative);
  }
  .subject-chip.relative.active {
    background: var(--relative);
    color: #fff;
    border-color: var(--relative);
  }

  .empty-cell {
    color: var(--text-empty);
    font-size: 0.8rem;
  }

  .star-note {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--text-sub);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .star-note .star-icon {
    color: var(--accent);
    font-size: 1rem;
    font-weight: 700;
  }

  /* Range cards */
  #range-section {
    max-width: 820px;
    margin: 0 auto;
  }
  #range-section .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  #range-section h2 {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-main);
  }
  #range-section .hint {
    font-size: 0.78rem;
    color: var(--text-sub);
  }

  .range-cards {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .range-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    padding: 1.25rem 1.5rem;
    border-left: 4px solid var(--accent);
    animation: slideIn 0.22s ease;
    overflow: hidden;
  }
  .range-card.relative-card {
    border-left-color: var(--relative);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .range-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }
  .range-card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-main);
  }
  .range-card-title.relative-title {
    color: var(--relative);
  }
  .range-card-badge {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 0.2rem 0.55rem;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .range-card-badge.relative-badge {
    background: var(--relative-bg);
    color: var(--relative);
  }
  .range-card-content {
    font-size: 0.87rem;
    color: var(--text-sub);
    line-height: 1.75;
    white-space: pre-wrap;
  }

  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-empty);
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.88rem; }

  @media (max-width: 600px) {
    .timetable { font-size: 0.78rem; }
    .timetable td.period-label { min-width: 110px; font-size: 0.7rem; }
    .subject-chip { font-size: 0.75rem; padding: 0.22rem 0.45rem; }
    .card { padding: 1.1rem; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="badge">2026 고3 2차고사</div>
  <h1>개인 맞춤형 시험 시간표</h1>
  <p>학번을 입력하면 나의 시험 과목과 범위를 확인할 수 있어요.</p>
</div>

<!-- 학번 입력 -->
<div class="card">
  <div class="input-section">
    <label for="student-id">학번 입력</label>
    <input type="text" id="student-id" value="30113" placeholder="예: 30113" />
    <div class="student-name-display" id="student-label"></div>
  </div>
</div>

<!-- 시간표 -->
<div class="card" id="timetable-card">
  <div class="section-title">📅 시험 시간표</div>
  <div style="overflow-x:auto;">
    <table class="timetable" id="timetable"></table>
  </div>
  <div class="star-note">
    <span class="star-icon">★</span>
    <span>별표는 상대평가 과목이 들어간 날을 의미함.</span>
  </div>
</div>

<!-- 시험 범위 -->
<div id="range-section">
  <div class="section-header">
    <h2>📖 시험 범위</h2>
    <span class="hint">과목명을 클릭하면 범위가 나타납니다.</span>
  </div>
  <div class="range-cards" id="range-cards">
    <div class="empty-state">
      <div class="icon">🖱️</div>
      <p>위 시간표에서 과목을 클릭하면<br>시험 범위가 여기에 표시됩니다.</p>
    </div>
  </div>
</div>

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const openRanges = new Set(); // currently shown subject names

// ─────────────────────────────────────────────
// Render timetable
// ─────────────────────────────────────────────

function getStudentSubjects(studentId) {
  if (STUDENT_DATA[studentId]) {
    const set = new Set(STUDENT_DATA[studentId]);
    COMMON_SUBJECTS.forEach(s => set.add(s));
    return set;
  }
  return new Set(COMMON_SUBJECTS);
}

function renderTimetable(studentId) {
  const studentSubjects = getStudentSubjects(studentId);
  const dates = Object.keys(FULL_SCHEDULE);
  const periods = ['1교시(08:40~9:30)', '2교시(09:50~10:40)', '3교시(11:00~11:50)', '4교시(12:05~12:55)'];
  const periodLabels = ['1교시 08:40–9:30', '2교시 09:50–10:40', '3교시 11:00–11:50', '4교시 12:05–12:55'];

  const table = document.getElementById('timetable');
  table.innerHTML = '';

  // Header
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  headerRow.innerHTML = `<th>교시</th>` + dates.map(d => {
    const hasRelative = periods.some(p => {
      const subs = FULL_SCHEDULE[d][p] || [];
      return subs.some(s => studentSubjects.has(s) && RELATIVE_SUBJECTS.has(s));
    });
    const star = hasRelative ? `<span class="star">★</span>` : '';
    return `<th>${d}${star}</th>`;
  }).join('');
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  periods.forEach((period, pi) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="period-label">${periodLabels[pi]}</td>`;
    dates.forEach(date => {
      const allSubs = FULL_SCHEDULE[date][period] || [];
      const mySubs = allSubs.filter(s => studentSubjects.has(s));
      const td = document.createElement('td');
      td.className = 'subject-cell';
      if (mySubs.length === 0) {
        td.innerHTML = `<span class="empty-cell">—</span>`;
      } else {
        td.innerHTML = mySubs.map(s => {
          const isRel = RELATIVE_SUBJECTS.has(s);
          const isActive = openRanges.has(s);
          let cls = 'subject-chip';
          if (isRel) cls += ' relative';
          if (isActive) cls += ' active';
          return `<span class="${cls}" data-subject="${s}">${s}</span>`;
        }).join('<br style="margin:3px 0">');
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  // Event delegation
  table.onclick = function(e) {
    const chip = e.target.closest('.subject-chip');
    if (!chip) return;
    const subject = chip.dataset.subject;
    toggleRange(subject);
  };
}

// ─────────────────────────────────────────────
// Toggle range card
// ─────────────────────────────────────────────
function toggleRange(subject) {
  if (openRanges.has(subject)) {
    openRanges.delete(subject);
  } else {
    openRanges.add(subject);
  }
  renderRangeCards();
  // Re-sync chip active states without full re-render
  document.querySelectorAll('.subject-chip').forEach(chip => {
    if (chip.dataset.subject === subject) {
      chip.classList.toggle('active', openRanges.has(subject));
    }
  });
}

function renderRangeCards() {
  const container = document.getElementById('range-cards');
  if (openRanges.size === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🖱️</div>
        <p>위 시간표에서 과목을 클릭하면<br>시험 범위가 여기에 표시됩니다.</p>
      </div>`;
    return;
  }
  container.innerHTML = '';
  openRanges.forEach(subject => {
    const key = getRangeKey(subject);
    const content = RANGE_DATA[key] || '시험 범위 데이터가 없습니다.';
    const isRel = RELATIVE_SUBJECTS.has(subject);
    const card = document.createElement('div');
    card.className = 'range-card' + (isRel ? ' relative-card' : '');
    card.innerHTML = `
      <div class="range-card-header">
        <div class="range-card-title ${isRel ? 'relative-title' : ''}">${subject}</div>
        <span class="range-card-badge ${isRel ? 'relative-badge' : ''}">${isRel ? '상대평가' : '절대평가'}</span>
      </div>
      <div class="range-card-content">${content}</div>
    `;
    container.appendChild(card);
  });
}

// ─────────────────────────────────────────────
// Init & Events
// ─────────────────────────────────────────────
function init() {
  const input = document.getElementById('student-id');
  const labelEl = document.getElementById('student-label');

  function update() {
    const id = input.value.trim();
    const known = !!STUDENT_DATA[id];
    labelEl.innerHTML = known
      ? `학번 <span>${id}</span> 시간표`
      : `<span style="color:var(--text-sub)">${id || '?'}</span> — 공통과목만 표시`;
    openRanges.clear();
    renderTimetable(id);
    renderRangeCards();
  }

  input.addEventListener('input', update);
  update();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
